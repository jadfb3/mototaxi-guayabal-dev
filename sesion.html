<html lang="es">
<head>

    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

        body {
            background: #0a0f16;
            background: radial-gradient(circle at 30% 10%, #1e2a38, #0b1017);
            min-height: 100vh;

            align-items: center;

            color: #eef2f5;
        }

            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);

            width: 100%;

        h2 { font-size: 2rem; font-weight: 600; text-align: center; color: #fadcb0; margin-bottom: 0.3rem; }
        .sub { text-align: center; color: #b9c8dd; margin-bottom: 2rem; font-size: 0.95rem; }

        label { display: block; margin-bottom: 0.4rem; font-weight: 500; color: #f5d7a3; font-size: 0.95rem; }
        input {
            width: 100%;

            width: 100%;
            background: linear-gradient(145deg, #f5b064, #d68f44);

            font-size: 1.3rem;
            padding: 1.2rem;
            border-radius: 60px;

            justify-content: center;

            margin: 0.5rem 0 1rem;
            cursor: pointer;
            box-shadow: 0 12px 25px -8px #b56f2e;

<!-- ══════════ LOGIN ══════════ -->

<script type="module">
    // ── Beep urgente estilo caja registradora ──
    let alarmaInterval = null;
    let alarmaCtx = null;

    // Audio MP3 principal
    let alarmaAudio = null;

    function playNotificationSound() {
        // Intentar MP3 primero
        try {
            if (alarmaAudio) { alarmaAudio.pause(); alarmaAudio.currentTime = 0; }
            alarmaAudio = new Audio('https://mototaxi-guayabal.vercel.app/alarma.mp3');
            alarmaAudio.loop = true;
            alarmaAudio.volume = 1.0;
            alarmaAudio.play().catch(() => beepFallback()); // si falla, usa beep
            return;
        } catch(e) { beepFallback(); }
    }

    // Fallback beep Web Audio API (cuando el MP3 no está disponible)
    function beepFallback() {
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            alarmaCtx = new AudioContext();
            let tick = 0;
            const maxTicks = 16;

            if (alarmaInterval) clearInterval(alarmaInterval);

            function beep() {
                const osc  = alarmaCtx.createOscillator();
                const gain = alarmaCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(1200, alarmaCtx.currentTime);
                gain.gain.setValueAtTime(0.4, alarmaCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, alarmaCtx.currentTime + 0.12);
                osc.connect(gain);
                gain.connect(alarmaCtx.destination);
                osc.start();
                osc.stop(alarmaCtx.currentTime + 0.12);
            }

            beep();
            alarmaInterval = setInterval(() => {
                tick++;
                beep();
                if (tick >= maxTicks) clearInterval(alarmaInterval);
            }, 500);
        } catch(e) { console.warn('Audio error:', e); }
    }

    function pararAlarma() {
        // Parar MP3
        if (alarmaAudio) {
            alarmaAudio.pause();
            alarmaAudio.currentTime = 0;
            alarmaAudio = null;
        }
        // Parar beep fallback
        if (alarmaInterval) {
            clearInterval(alarmaInterval);
            alarmaInterval = null;
        }
        if (alarmaCtx) {
            try { alarmaCtx.close(); } catch(e) {}
            alarmaCtx = null;
        }
    }

    function vibrar() {
        // vibración agresiva por 8 segundos
        if (navigator.vibrate) navigator.vibrate([
            300,100, 300,100, 300,100,
            300,100, 300,100, 300,100,
            300,100, 300,100, 300,100,
            300,100, 300,100, 300,100
        ]);
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
        getFirestore,
        collection, doc,
        query, where, orderBy, limit,
        getDoc, getDocs, onSnapshot, updateDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB117FiWsQTCqbqC8LFPSzPKepHXn4eXcM",
        authDomain: "delivery-e3221.firebaseapp.com",
        projectId: "delivery-e3221",
        storageBucket: "delivery-e3221.firebasestorage.app",
        messagingSenderId: "555123509664",
        appId: "1:555123509664:web:8aaaed8f301f81ecc93cc5",
        measurementId: "G-RH3HJJ6QLZ"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const messaging = getMessaging(app);

    // ── AUTO-LOGIN desde Flutter (motoId en URL o localStorage) ──
    async function checkAutoLogin() {
        const params = new URLSearchParams(window.location.search);
        const motoId = params.get('motoId') || localStorage.getItem('flutterMotoId');
        if (!motoId) return;
        localStorage.removeItem('flutterMotoId'); // limpiar después de usar
        try {
            const snap = await getDoc(doc(db, "motorizados", motoId));
            if (!snap.exists()) return;
            const data = snap.data();
            if (data.desactivado) return;
            motoActual = { id: snap.id, ...data };
            await cargarComision();
            const sessionToken = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36);
            motoActual.sessionToken = sessionToken;
            await updateDoc(doc(db, "motorizados", motoActual.id), { sessionToken });
            const [snapCarrera, snapViaje] = await Promise.all([
                getDocs(query(collection(db, "carreras"), where("motorizadoId", "==", snap.id), where("estado", "in", ["asignada", "abierto"]))),
                getDocs(query(collection(db, "viajes"), where("motorizadoId", "==", snap.id), where("estado", "in", ["asignada"])))
            ]);
            const tieneCarreraActiva = !snapCarrera.empty || !snapViaje.empty;
            if (!tieneCarreraActiva) {
                await updateDoc(doc(db, "motorizados", motoActual.id), { estado: 'disponible' });
                motoActual.estado = 'disponible';
            } else {
                motoActual.estado = 'en carrera';
            }
            mostrarPanel();
        } catch(e) { console.log("Auto-login error:", e); }
    }

    // ── VAPID KEY (clave pública FCM) ──
    const vapidKey = 'BOJBuRcER-WGrPbQUGSfe4WBssCt6IQbczg_BTVD0wVWwwo6V-aqMfXWBx1dgGQ1p5MUdifjrWOpd1MK1exH9yA';

    async function registrarTokenFCM(motoId) {
        try {
            const permiso = await Notification.requestPermission();
            console.log("🔔 Permiso: " + permiso);
            if (permiso !== "granted") return;
            const token = await getToken(messaging, { vapidKey });
            if (token) {
                console.log("✅ Token: " + token.substring(0, 30) + "...");
                await updateDoc(doc(db, "motorizados", motoId), { fcmToken: token });
                console.log("✅ Guardado en Firestore");
            } else {
                console.log("❌ Token vacío");
            }
        } catch(e) {
            console.log("❌ Error FCM: " + e.message);
        }
    }

    let motoActual     = null;
    let unsubMoto      = null;
    let unsubPedidos   = null;
    let unsubHistorial = null;
    let pctComision    = 10; // valor por defecto, se actualiza desde Firebase

    async function cargarComision() {
        try {
            const snap = await getDocs(collection(db, "configuracion"));
            if (!snap.empty) pctComision = snap.docs[0].data().comision || 10;
        } catch(e) {}
    }

    document.getElementById('panelFecha').innerHTML =
        `<i class="far fa-calendar-alt"></i> ${new Date().toLocaleDateString('es-VE')}`;

    checkAutoLogin();

    // ════════ LOGIN ════════
    const btnLogin = document.getElementById('btnLogin');
    const errorBox = document.getElementById('errorBox');

    btnLogin.addEventListener('click', async () => {
        const tel = document.getElementById('loginTel').value.trim();
        const pin = document.getElementById('loginPin').value.trim();

        if (!tel || !pin) { showError('Escribe tu teléfono y PIN.'); return; }

        btnLogin.disabled = true;
        btnLogin.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Verificando...`;
        errorBox.style.display = 'none';

        try {
            const snap = await getDocs(query(collection(db, "motorizados"), where("telefono", "==", tel)));

            if (snap.empty)                       { showError('Teléfono no registrado. Contacta al administrador.'); return; }
            const ref  = snap.docs[0];
            const data = ref.data();
            if (data.pin !== pin)                 { showError('PIN incorrecto. Intenta de nuevo.'); return; }
            if (data.desactivado)                 { showError('Tu cuenta está desactivada. Contacta al administrador.'); return; }
            if (data.tipo && data.tipo !== 'mototaxi') { showError('Este acceso es solo para Moto Taxi Guayabal.'); return; }

            motoActual = { id: ref.id, ...data };
            await cargarComision();

            // ── SESSION TOKEN: bloquear sesión duplicada (desactivado temporalmente) ──
            // if (data.sessionToken && data.estado !== 'desconectado') {
            //     showError('⚠️ Ya tienes una sesión activa en otro dispositivo. Cierra sesión allá primero.');
            //     return;
            // }
            const sessionToken = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36);
            motoActual.sessionToken = sessionToken;
            await updateDoc(doc(db, "motorizados", motoActual.id), { sessionToken });

            // Verificar si tiene una carrera o viaje activo antes de cambiar estado
            const [snapCarrera, snapViaje] = await Promise.all([
                getDocs(query(collection(db, "carreras"), where("motorizadoId", "==", ref.id), where("estado", "in", ["asignada", "abierto"]))),
                getDocs(query(collection(db, "viajes"),   where("motorizadoId", "==", ref.id), where("estado", "in", ["asignada"])))
            ]);
            const tieneCarreraActiva = !snapCarrera.empty || !snapViaje.empty;

            // Solo poner disponible si NO tiene carrera activa
            if (!tieneCarreraActiva) {
                await updateDoc(doc(db, "motorizados", motoActual.id), { estado: 'disponible' });
                motoActual.estado = 'disponible';
            } else {
                // mantener en carrera
                motoActual.estado = 'en carrera';
            }
            mostrarPanel();

        } catch(err) {
            showError('Error de conexión. Revisa tu internet.');
        } finally {
            btnLogin.disabled = false;
            btnLogin.innerHTML = `<i class="fas fa-sign-in-alt"></i> Ingresar`;
        }
    });

    document.getElementById('loginPin').addEventListener('keypress', e => { if (e.key === 'Enter') btnLogin.click(); });

    function showError(txt) {
        document.getElementById('errorTxt').textContent = txt;
        errorBox.style.display = 'block';
    }

    // ════════ PANEL ════════
    function mostrarPanel() {
        document.getElementById('loginCard').classList.add('hidden');
        document.getElementById('panelCard').classList.remove('hidden');
        document.getElementById('panelNombre').textContent   = motoActual.nombre;
        document.getElementById('panelVehiculo').textContent = motoActual.vehiculo;
        marcarEstado(motoActual.estado || 'disponible');
        escucharDatos();
        // FCM token lo maneja Flutter — no se registra aquí
    }

    function escucharDatos() {
        // Stats del motorizado en tiempo real
        unsubMoto = onSnapshot(doc(db, "motorizados", motoActual.id), snap => {
            if (!snap.exists()) return;
            const d = snap.data();

            // ── Si el token cambió significa que otro inició sesión — ignorar, el bloqueo ya ocurrió en login ──
            if (d.sessionToken && d.sessionToken !== motoActual.sessionToken) return;

            // Mantener motoActual sincronizado con Firestore
            motoActual.entregas          = d.entregas || 0;
            motoActual.comisionAcumulada = d.comisionAcumulada || 0;
            motoActual.estado            = d.estado;
            motoActual.desactivado       = d.desactivado;

            document.getElementById('statEntregas').textContent = motoActual.entregas;

            if (d.estado) marcarEstado(d.estado);

            // Si el admin desactiva al motorizado, forzar desconectado y mostrar aviso
            const aviso = document.getElementById('avisoCentral');
            if (d.desactivado) {
                marcarEstado('desconectado');
                document.querySelectorAll('.btn-estado').forEach(b => b.disabled = true);
                aviso.style.display = 'block';
            } else {
                document.querySelectorAll('.btn-estado').forEach(b => b.disabled = false);
                aviso.style.display = 'none';
            }
        });

        // Pedidos activos asignados a este motorizado
        unsubPedidos = onSnapshot(
            query(collection(db, "carreras"), where("motorizadoId", "==", motoActual.id), where("estado", "in", ["asignada", "pendiente"])),
            snap => renderPedidos(snap.docs.map(d => ({ id: d.id, ...d.data() })))
        );

        // Carreras abiertas disponibles para tomar
        let carrerasAbiertas = new Set(); // para detectar nuevas
        let primeraCarrerasCarga = true; // flag para ignorar carga inicial
        onSnapshot(
            query(collection(db, "carreras"), where("estado", "==", "abierto")),
            snap => {
                const lista = snap.docs.map(d => ({ id: d.id, ...d.data() }));

                // Detectar si llegó una carrera nueva (no estaba antes)
                if (!primeraCarrerasCarga && motoActual?.estado === 'disponible') {
                    // Sonido manejado por FCM (Flutter) — solo vibración leve como respaldo
                    snap.docChanges().forEach(change => {
                        if (change.type === 'added' && !carrerasAbiertas.has(change.doc.id)) {
                            vibrar();
                        }
                    });
                }
                primeraCarrerasCarga = false;
                // Actualizar el set de carreras conocidas
                carrerasAbiertas = new Set(snap.docs.map(d => d.id));

                renderCarrerasDisponibles(lista);
            }
        );

        // Viajes asignados a este motorizado
        onSnapshot(
            query(collection(db, "viajes"), where("motorizadoId", "==", motoActual.id), where("estado", "in", ["asignada"])),
            snap => renderViajesAsignados(snap.docs.map(d => ({ id: d.id, ...d.data() })))
        );

        // Viajes abiertos disponibles para tomar
        let viajesAbiertos = new Set();
        let primeraViajesCarga = true; // flag para ignorar carga inicial
        onSnapshot(
            query(collection(db, "viajes"), where("estado", "==", "abierto")),
            snap => {
                const lista = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (!primeraViajesCarga && motoActual?.estado === 'disponible') {
                    // Sonido manejado por FCM (Flutter) — solo vibración leve como respaldo
                    snap.docChanges().forEach(change => {
                        if (change.type === 'added' && !viajesAbiertos.has(change.doc.id)) {
                            vibrar();
                        }
                    });
                }
                primeraViajesCarga = false;
                viajesAbiertos = new Set(snap.docs.map(d => d.id));
                renderViajesDisponibles(lista);
            }
        );

        // Historial últimas 10 carreras (sin orderBy para evitar índice compuesto)
        unsubHistorial = onSnapshot(
            query(collection(db, "carreras"), where("motorizadoId", "==", motoActual.id)),
            snap => {
                const lista = snap.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => {
                        const ta = a.fechaHora?.toDate ? a.fechaHora.toDate() : new Date(0);
                        const tb = b.fechaHora?.toDate ? b.fechaHora.toDate() : new Date(0);
                        return tb - ta;
                    })
                    .slice(0, 10);
                renderHistorial(lista);
            }
        );
    }

    // ── RENDER VIAJES DISPONIBLES (para tomar) ──
    let viajesDisponiblesData = [];

    function renderViajesDisponibles(lista) {
        viajesDisponiblesData = lista;
        renderSeccionDisponibles();
    }

                ${v.cliente?.gps && v.cliente.gps !== 'No compartida'
                    ? `<a class="btn-gps-pedido" href="javascript:void(0)" onclick="abrirNavegacion('${v.cliente.gps}')"><i class="fas fa-map-marker-alt"></i> 🧭 Navegar</a>`

                <button class="btn-aceptar-carrera btn-aceptar-viaje" data-vid="${v.id}"
                    style="background:linear-gradient(145deg,#f5b064,#d68f44); color:#0d1a24; box-shadow:0 6px 16px -6px #b56f2e;">
                    <i class="fas fa-hand-paper"></i> Aceptar viaje
                </button>

                    <i class="fas fa-bell-slash"></i> No me interesa · Silenciar
                </button>
            </div>`).join('');

        // Render carreras
        const carrerasHTML = carrerasFiltradas.map(c => `
            <div class="carrera-disponible">
                <h4><i class="fas fa-store"></i> ${c.restaurante || '—'}</h4>
                <div class="pedido-row"><i class="fas fa-map-pin"></i> ${c.cliente?.barrio || '—'}</div>
                <button class="btn-aceptar-carrera btn-aceptar-carrera-item" data-cid="${c.id}">
                    <i class="fas fa-hand-paper"></i> Aceptar carrera
                </button>
                <button class="btn-cancelar btn-silenciar-carrera" data-cid="${c.id}">
                    <i class="fas fa-bell-slash"></i> No me interesa · Silenciar
                </button>
            </div>`).join('');

        cont.innerHTML = viajesHTML + carrerasHTML;

        // Listeners viajes
        cont.querySelectorAll('.btn-aceptar-viaje').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (motoActual.estado !== 'disponible') { console.log('Solo puedes aceptar si estás disponible.'); return; }
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Aceptando...';
                pararAlarma();
                try {
                    await updateDoc(doc(db, 'viajes', btn.dataset.vid), {
                        estado: 'asignada',
                        motorizadoId: motoActual.id,
                        motorizadoNombre: motoActual.nombre
                    });
                    await updateDoc(doc(db, 'motorizados', motoActual.id), { estado: 'en carrera' });
                } catch(e) {
                    console.log('❌ Otro motorizado lo tomó primero.');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-hand-paper"></i> Aceptar viaje';
                }
            });
        });

        // Listeners carreras
        cont.querySelectorAll('.btn-aceptar-carrera-item').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (motoActual.estado !== 'disponible') { console.log('Solo puedes aceptar si estás disponible.'); return; }
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Aceptando...';
                pararAlarma();
                try {
                    await updateDoc(doc(db, 'carreras', btn.dataset.cid), {
                        estado: 'asignada',
                        motorizadoId: motoActual.id,
                        motorizadoNombre: motoActual.nombre
                    });
                    await updateDoc(doc(db, 'motorizados', motoActual.id), { estado: 'en carrera' });
                } catch(e) {
                    console.log('❌ Otro motorizado la tomó primero.');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-hand-paper"></i> Aceptar carrera';
                }
            });
        });

        // Listeners silenciar viaje
        cont.querySelectorAll('.btn-silenciar-viaje').forEach(btn => {
            btn.addEventListener('click', () => {
                viajesIgnorados.add(btn.dataset.vid);
                pararAlarma();
                renderSeccionDisponibles();
            });
        });

        // Listeners silenciar carrera
        cont.querySelectorAll('.btn-silenciar-carrera').forEach(btn => {
            btn.addEventListener('click', () => {
                carrerasIgnoradas.add(btn.dataset.cid);
                pararAlarma();
                renderSeccionDisponibles();
            });
        });
    }

    // ── RENDER VIAJES ASIGNADOS (para confirmar) ──
    let viajesAsignadosData = [];

    function renderViajesAsignados(lista) {
        viajesAsignadosData = lista;
        renderSeccionAsignados();
    }

    function renderSeccionAsignados() {
        const cont = document.getElementById('pedidosPendientes');
        document.getElementById('labelPendientes').textContent = viajesAsignadosData.length ? `${viajesAsignadosData.length} activo(s)` : '';

        if (!viajesAsignadosData.length) {
            cont.innerHTML = `<div class="empty-state"><i class="fas fa-check-circle"></i><br>Sin servicios asignados</div>`;
            return;
        }

        cont.innerHTML = viajesAsignadosData.map(v => `
            <div class="pedido-pendiente" style="border-color:#f5b06460; background:linear-gradient(145deg,#2a2010,#1f1a0c);">
                <h4 style="color:#fadcb0;"><i class="fas fa-motorcycle" style="margin-right:6px;"></i>Viaje · Moto Taxi</h4>
                <div class="pedido-row"><i class="fas fa-user"></i> ${v.cliente?.nombre || '—'}</div>
                <div class="pedido-row"><i class="fas fa-phone-alt"></i>
                    ${v.cliente?.telefono
                        ? `<a href="javascript:void(0)"
                              data-tel="${v.cliente.telefono}" onclick="abrirWA(this.dataset.tel)" 
                              style="color:#25D366; font-weight:600; text-decoration:none;">

                <div class="pedido-row"><i class="fas fa-flag-checkered"></i> <strong>Destino:</strong> ${v.cliente?.destino || '—'}</div>
                ${v.cliente?.gps && v.cliente.gps !== 'No compartida'
                    ? `<a class="btn-gps-pedido" href="javascript:void(0)" onclick="abrirNavegacion('${v.cliente.gps}')"><i class="fas fa-map-marker-alt"></i> 🧭 Navegar</a>`
                    : ''}
                <button class="btn-entregado btn-completar-viaje" data-viaje-id="${v.id}">
                    <i class="fas fa-flag-checkered"></i> Confirmar llegada
                </button>
            </div>`).join('');

        cont.querySelectorAll('.btn-completar-viaje').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (!confirm('¿Confirmar llegada a destino?')) return;
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';
                try {
                    await updateDoc(doc(db, 'viajes', btn.dataset.viajeId), {
                        estado: 'completado'
                    });
                    await updateDoc(doc(db, 'motorizados', motoActual.id), {

                    });

                    btn.innerHTML = '<i class="fas fa-flag-checkered"></i> Confirmar llegada';
                }
            });
        });
    }

    // carreras disponibles — ahora gestionadas dentro de renderSeccionDisponibles
    let carrerasDisponiblesData = [];

    // IDs ignorados localmente (silenciados sin tocar Firestore)
    const viajesIgnorados   = new Set();
    const carrerasIgnoradas = new Set();

    function renderCarrerasDisponibles(lista) {
        carrerasDisponiblesData = lista;
        renderSeccionDisponibles();
    }

    function renderPedidos(lista) {
        const cont = document.getElementById('pedidosPendientes');
        document.getElementById('labelPendientes').textContent = lista.length ? `${lista.length} activo(s)` : '';
        if (!lista.length) { cont.innerHTML = `<div class="empty-state"><i class="fas fa-check-circle"></i><br>Sin pedidos asignados</div>`; return; }
        cont.innerHTML = lista.map(c => `
            <div class="pedido-pendiente" id="pedido-card-${c.id}">

                <div class="pedido-row"><i class="fas fa-user"></i> ${c.cliente?.nombre || '—'}</div>
                <div class="pedido-row"><i class="fas fa-phone-alt"></i>
                    ${c.cliente?.telefono
                        ? `<a href="javascript:void(0)"
                              data-tel="${c.cliente.telefono}" onclick="abrirWA(this.dataset.tel)" 
                              style="color:#25D366; font-weight:600; text-decoration:none;">

                <div class="pedido-row"><i class="fas fa-home"></i> ${c.cliente?.direccion || '—'}</div>
                ${c.cliente?.gps && c.cliente.gps !== 'No compartida'
                    ? `<a class="btn-gps-pedido" href="javascript:void(0)" onclick="abrirNavegacion('${c.cliente.gps}')"><i class="fas fa-map-marker-alt"></i> 🧭 Navegar</a>`
                    : ''}

                <button class="btn-entregado" data-pedido-id="${c.id}" data-moto-id="${motoActual.id}" data-precio="${c.precioCobrado || 0}">
                    <i class="fas fa-check-circle"></i> Confirmar entrega
                </button>
                <button class="btn-cancelar btn-cancelar-carrera" data-pedido-id="${c.id}">
                    <i class="fas fa-times-circle"></i> Cancelar carrera
                </button>

        // Listeners botón entregado
        cont.querySelectorAll('.btn-entregado').forEach(btn => {
            btn.addEventListener('click', async () => {
                const pedidoId = btn.dataset.pedidoId;
                const motoId   = btn.dataset.motoId;
                const monto    = parseFloat(btn.dataset.precio) || 0;

                if (!confirm('¿Confirmar entrega?')) return;

                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';

                try {
                    await updateDoc(doc(db, 'carreras', pedidoId), {
                        estado: 'completado'
                    });
                    await updateDoc(doc(db, 'motorizados', motoId), {
                        estado: 'disponible',

                    });

        // Listeners botón cancelar carrera

            btn.addEventListener('click', async () => {
                if (!confirm('¿Cancelar esta carrera? Volverá a estar disponible para otros motorizados.')) return;

                try {
                    await updateDoc(doc(db, 'carreras', btn.dataset.pedidoId), {
                        estado: 'abierto',
                        motorizadoId: null,
                        motorizadoNombre: null
                    });
                    await updateDoc(doc(db, 'motorizados', motoActual.id), { estado: 'disponible' });

                    console.log('❌ Error al cancelar la carrera.');

                    btn.innerHTML = '<i class="fas fa-times-circle"></i> Cancelar carrera';

        });
    }

        cont.innerHTML = lista.map(c => {
            const hora = c.fechaHora?.toDate ? c.fechaHora.toDate().toLocaleTimeString('es-VE', { hour:'2-digit', minute:'2-digit' }) : '--:--';
            return `
            <div class="carrera-item">
                <div>

                    <div class="carrera-sub"><i class="fas fa-map-marker-alt" style="margin-right:4px;"></i>${c.cliente?.barrio || '—'} · ${hora}</div>
                </div>
                <div class="carrera-monto">$${(parseFloat(c.precioCobrado) || 0).toFixed(2)}</div>
            </div>`;
        }).join('');
    }

    // Los botones de estado son solo indicadores visuales — no responden al clic

    function marcarEstado(estado) {
        document.querySelectorAll('.btn-estado').forEach(b => {
            b.classList.toggle('activo', b.dataset.estado === estado);
            // Bloquear botones cuando está en carrera
            if (estado === 'en carrera') {
                b.disabled = true;
                b.style.opacity = b.dataset.estado === 'en carrera' ? '1' : '0.4';
            } else if (estado === 'disponible') {
                b.disabled = false;
                b.style.opacity = '1';
            }
        });
    }

    // ════════ LOGOUT ════════
    document.getElementById('btnLogout').addEventListener('click', async () => {
        if (motoActual) {
            try { await updateDoc(doc(db, "motorizados", motoActual.id), { estado: 'desconectado', sessionToken: null }); } catch(_) {}
        }
        [unsubMoto, unsubPedidos, unsubHistorial].forEach(u => u && u());
        motoActual = null;
        document.getElementById('panelCard').classList.add('hidden');
        document.getElementById('loginCard').classList.remove('hidden');
        document.getElementById('loginTel').value = '';
        document.getElementById('loginPin').value = '';
        errorBox.style.display = 'none';
    });

</script>
<script>
        function abrirWA(tel) {
            const num = tel.replace(/^0/, '').replace(/[^0-9]/g, '');
            abrirExterno('https://wa.me/58' + num + '?text=Buenas%2C%20confirma%20el%20servicio%20de%20mototaxi%3F');
        }

        function abrirNavegacion(gpsUrl) {
            const match = gpsUrl.match(/q=([\d.-]+),([\d.-]+)/);
            if (match) {
                const lat = match[1];
                const lng = match[2];
                const url = 'geo:' + lat + ',' + lng + '?q=' + lat + ',' + lng;
                abrirExterno(url);
            } else {
                abrirExterno(gpsUrl);
            }
        }

        function abrirExterno(url) {
            window.location.href = 'extapp://' + encodeURIComponent(url);
        }

</script>
